version: 2

updates:
  # npm dependencies
  - package-ecosystem: npm
    directory: /
    target-branch: beta
    schedule:
      interval: weekly
      day: monday
    cooldown:
      default-days: 3
      semver-major-days: 7
    groups:
      dev-dependencies:
        dependency-type: development
      prod-dependencies:
        dependency-type: production
    open-pull-requests-limit: 10

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    target-branch: beta
    schedule:
      interval: weekly
      day: monday
    groups:
      github-actions:
        patterns:
          - '*'
    open-pull-requests-limit: 5
