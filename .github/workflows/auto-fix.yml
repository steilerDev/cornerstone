name: Auto Fix

on:
  push:
    branches: [beta]

concurrency:
  group: auto-fix-beta
  cancel-in-progress: true

jobs:
  auto-fix:
    name: Auto Fix Lint & Format
    runs-on: ubuntu-latest
    if: github.actor != 'cornerstone-bot[bot]'
    steps:
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3
        with:
          app-id: ${{ vars.BOT_APP_ID }}
          private-key: ${{ secrets.BOT_PRIVATE_KEY }}
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: beta
          token: ${{ steps.app-token.outputs.token }}
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - name: Run lint fix
        run: npm run lint:fix || true
      - name: Report remaining lint issues
        run: npm run lint --quiet || true
      - name: Run format
        run: npm run format
      - name: Run audit fix
        run: npm audit fix || true
      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Push fixes to beta
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          git config user.name "cornerstone-bot[bot]"
          git config user.email "${{ steps.app-token.outputs.app-slug }}[bot]@users.noreply.github.com"
          git add -A
          git commit -m "style: auto-fix lint and format [skip ci]"
          git push origin beta
