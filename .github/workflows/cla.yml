name: CLA

on:
  pull_request_target:
    types: [opened, synchronize, reopened]
    branches: [beta, main]

  issue_comment:
    types: [created]

permissions: {}

jobs:
  cla-check:
    name: CLA Check
    runs-on: ubuntu-latest

    if: >-
      github.event_name == 'pull_request_target'
      || (
        github.event_name == 'issue_comment'
        && github.event.issue.pull_request
        && (
          github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA'
          || github.event.comment.body == 'recheck'
        )
      )

    steps:
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3
        with:
          app-id: ${{ vars.BOT_APP_ID }}
          private-key: ${{ secrets.BOT_PRIVATE_KEY }}

      - name: CLA check
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const SIGN_PHRASE = 'I have read the CLA Document and I hereby sign the CLA';
            const ALLOWLIST = [
              'dependabot[bot]',
              'github-actions[bot]',
              'steilerdev-cornerstone-bot[bot]',
              'claude',
            ];
            const CLA_DIR = '.github/cla';
            const CLA_URL = 'https://github.com/steilerDev/cornerstone/blob/main/CLA.md';
            const COMMENT_MARKER = '<!-- cla-bot -->';
            const SIGNATURE_BRANCH = 'beta';
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // ── Resolve PR context ───────────────────────────────────
            let prNumber, baseBranch, headSha;

            if (context.eventName === 'pull_request_target') {
              prNumber = context.payload.pull_request.number;
              baseBranch = context.payload.pull_request.base.ref;
              headSha = context.payload.pull_request.head.sha;
            } else {
              // issue_comment — resolve the PR
              prNumber = context.payload.issue.number;
              const { data: pr } = await github.rest.pulls.get({
                owner,
                repo,
                pull_number: prNumber,
              });
              baseBranch = pr.base.ref;
              headSha = pr.head.sha;

              // Only process PRs targeting beta or main
              if (baseBranch !== 'beta' && baseBranch !== 'main') {
                core.info(`PR #${prNumber} targets '${baseBranch}' — skipping.`);
                return;
              }
            }

            core.info(`PR #${prNumber} (base: ${baseBranch}, head: ${headSha})`);

            // ── Collect all PR authors ────────────────────────────────
            const authors = new Map(); // login -> { name, id }

            const commits = await github.paginate(github.rest.pulls.listCommits, {
              owner,
              repo,
              pull_number: prNumber,
              per_page: 100,
            });

            for (const c of commits) {
              if (c.author?.login) {
                authors.set(c.author.login, {
                  name: c.author.login,
                  id: c.author.id,
                });
              }

              // Parse Co-authored-by trailers for co-authors
              const msg = c.commit.message || '';
              const coAuthorRe = /Co-authored-by:\s*.+?\s*<(?:(\d+)\+)?([^@]+)@users\.noreply\.github\.com>/gi;
              let m;
              while ((m = coAuthorRe.exec(msg)) !== null) {
                const login = m[2];
                if (!authors.has(login)) {
                  try {
                    const { data: user } = await github.rest.users.getByUsername({ username: login });
                    authors.set(login, { name: login, id: user.id });
                  } catch {
                    authors.set(login, { name: login, id: null });
                  }
                }
              }
            }

            core.info(`Authors (${authors.size}): ${[...authors.keys()].join(', ')}`);

            // ── Check signatures ─────────────────────────────────────
            // Each signer has their own file: .github/cla/{login}.json
            const signedLogins = new Set();

            for (const [login] of authors) {
              if (ALLOWLIST.includes(login)) continue;
              try {
                await github.rest.repos.getContent({
                  owner,
                  repo,
                  path: `${CLA_DIR}/${login}.json`,
                  ref: SIGNATURE_BRANCH,
                });
                signedLogins.add(login);
                core.info(`  ${login} — signed`);
              } catch (e) {
                if (e.status === 404) {
                  core.info(`  ${login} — NOT signed`);
                } else {
                  throw e;
                }
              }
            }

            // ── Handle signing comment ───────────────────────────────
            const isSigning =
              context.eventName === 'issue_comment' &&
              context.payload.comment.body === SIGN_PHRASE;

            if (isSigning) {
              const commenter = context.payload.comment.user.login;
              const commenterId = context.payload.comment.user.id;
              const commentId = context.payload.comment.id;

              if (ALLOWLIST.includes(commenter)) {
                core.info(`${commenter} is allowlisted — no signature needed.`);
              } else if (signedLogins.has(commenter)) {
                core.info(`${commenter} has already signed.`);
              } else {
                core.info(`Recording CLA signature for ${commenter}`);

                const signature = {
                  name: commenter,
                  id: commenterId,
                  comment_id: commentId,
                  created_at: new Date().toISOString(),
                  pullRequestNo: prNumber,
                };

                const content = JSON.stringify(signature, null, 2) + '\n';

                await github.rest.repos.createOrUpdateFileContents({
                  owner,
                  repo,
                  path: `${CLA_DIR}/${commenter}.json`,
                  message: `chore: record CLA signature for ${commenter} [skip ci]`,
                  content: Buffer.from(content).toString('base64'),
                  branch: SIGNATURE_BRANCH,
                  committer: {
                    name: 'cornerstone-bot[bot]',
                    email: '${{ steps.app-token.outputs.app-slug }}[bot]@users.noreply.github.com',
                  },
                });

                signedLogins.add(commenter);
                core.info(`Signature committed to ${SIGNATURE_BRANCH}.`);

                // React to acknowledge
                await github.rest.reactions.createForIssueComment({
                  owner,
                  repo,
                  comment_id: commentId,
                  content: '+1',
                });
              }
            }

            // ── Determine unsigned contributors ──────────────────────
            const unsigned = [];
            for (const [login] of authors) {
              if (ALLOWLIST.includes(login)) continue;
              if (signedLogins.has(login)) continue;
              unsigned.push(login);
            }

            // ── Post or update comment ───────────────────────────────
            if (unsigned.length > 0) {
              const comments = await github.paginate(github.rest.issues.listComments, {
                owner,
                repo,
                issue_number: prNumber,
                per_page: 100,
              });

              const existing = comments.find(c => c.body?.includes(COMMENT_MARKER));

              const body = [
                COMMENT_MARKER,
                `Thank you for your submission! We require all contributors to sign our [Contributor License Agreement](${CLA_URL}) before we can accept your contribution.`,
                '',
                `**The following contributor(s) have not signed the CLA:** ${unsigned.map(u => `@${u}`).join(', ')}`,
                '',
                'To sign, please comment on this PR with:',
                `**${SIGN_PHRASE}**`,
                '',
                '_You can comment `recheck` to re-run the CLA check._',
              ].join('\n');

              if (existing) {
                await github.rest.issues.updateComment({
                  owner,
                  repo,
                  comment_id: existing.id,
                  body,
                });
              } else {
                await github.rest.issues.createComment({
                  owner,
                  repo,
                  issue_number: prNumber,
                  body,
                });
              }
            }

            // ── Set commit status ────────────────────────────────────
            const allSigned = unsigned.length === 0;

            await github.rest.repos.createCommitStatus({
              owner,
              repo,
              sha: headSha,
              state: allSigned ? 'success' : 'failure',
              context: 'CLA',
              description: allSigned
                ? 'All contributors have signed the CLA.'
                : `Waiting on CLA from: ${unsigned.join(', ')}`,
              target_url: CLA_URL,
            });

            if (!allSigned) {
              core.setFailed(`CLA not signed by: ${unsigned.join(', ')}`);
            }
