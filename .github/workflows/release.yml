name: Release

on:
  push:
    branches: [main, beta]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Semantic Release (main or beta push)
  # ---------------------------------------------------------------------------
  release:
    name: Semantic Release
    runs-on: ubuntu-latest

    permissions:
      contents: write
      issues: write
      pull-requests: write

    outputs:
      new-release-published: ${{ steps.semantic.outputs.new-release-published }}
      new-release-version: ${{ steps.semantic.outputs.new-release-version }}
      is-prerelease: ${{ steps.semantic.outputs.is-prerelease }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify dependency signatures
        run: npm audit signatures

      - name: Semantic Release
        id: semantic
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          OUTPUT=$(npx semantic-release 2>&1) || true
          echo "$OUTPUT"
          if echo "$OUTPUT" | grep -q "Created tag v"; then
            VERSION=$(echo "$OUTPUT" | grep -oP 'Created tag v\K[0-9]+\.[0-9]+\.[0-9]+(-beta\.[0-9]+)?' || echo "")
            echo "new-release-published=true" >> "$GITHUB_OUTPUT"
            echo "new-release-version=$VERSION" >> "$GITHUB_OUTPUT"
            if echo "$VERSION" | grep -q "beta"; then
              echo "is-prerelease=true" >> "$GITHUB_OUTPUT"
            else
              echo "is-prerelease=false" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "new-release-published=false" >> "$GITHUB_OUTPUT"
            echo "new-release-version=" >> "$GITHUB_OUTPUT"
            echo "is-prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Enrich release notes with summary
        if: >-
          steps.semantic.outputs.new-release-published == 'true' &&
          steps.semantic.outputs.is-prerelease == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.semantic.outputs.new-release-version }}"
          if [ ! -f RELEASE_SUMMARY.md ]; then
            echo "No RELEASE_SUMMARY.md found — keeping auto-generated notes"
            exit 0
          fi

          echo "Prepending RELEASE_SUMMARY.md to release v${VERSION}"
          SUMMARY=$(cat RELEASE_SUMMARY.md)
          EXISTING=$(gh release view "v${VERSION}" --json body --jq '.body')

          COMBINED=$(printf '%s\n\n---\n\n%s' "$SUMMARY" "$EXISTING")
          echo "$COMBINED" | gh release edit "v${VERSION}" --notes-file -

      - name: Job summary
        if: always()
        run: |
          VERSION="${{ steps.semantic.outputs.new-release-version }}"
          PUBLISHED="${{ steps.semantic.outputs.new-release-published }}"
          PRERELEASE="${{ steps.semantic.outputs.is-prerelease }}"

          if [ "$PUBLISHED" = "true" ]; then
            if [ "$PRERELEASE" = "true" ]; then
              RELEASE_TYPE="Beta"
            else
              RELEASE_TYPE="Stable"
            fi
            {
              echo "### Release v${VERSION} (${RELEASE_TYPE})"
              echo ""
              echo "| Detail | Value |"
              echo "|--------|-------|"
              echo "| **Version** | \`${VERSION}\` |"
              echo "| **Type** | ${RELEASE_TYPE} |"
              echo "| **GitHub Release** | [v${VERSION}](https://github.com/steilerDev/cornerstone/releases/tag/v${VERSION}) |"
            } >> "$GITHUB_STEP_SUMMARY"
          else
            {
              echo "### No Release"
              echo ""
              echo "No new release — commits since last tag did not trigger a version bump."
            } >> "$GITHUB_STEP_SUMMARY"
          fi

  # ---------------------------------------------------------------------------
  # Job 2: Docker Build (per-platform, native runners — no QEMU)
  # ---------------------------------------------------------------------------
  docker-build:
    name: Docker Build (${{ matrix.platform }})
    needs: [release]
    if: needs.release.outputs.new-release-published == 'true'
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: true
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm

    permissions:
      contents: read
      deployments: write
      id-token: write

    environment:
      name: ${{ needs.release.outputs.is-prerelease == 'true' && 'dockerhub-beta' || 'dockerhub-production' }}
      url: https://hub.docker.com/r/steilerdev/cornerstone/tags?name=${{ needs.release.outputs.new-release-version }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: v${{ needs.release.outputs.new-release-version }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Login to DHI registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: dhi.io
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to Docker Hub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7
        with:
          context: .
          platforms: ${{ matrix.platform }}
          provenance: mode=max
          sbom: true
          cache-from: type=gha,scope=${{ matrix.platform }}
          cache-to: type=gha,mode=max,scope=${{ matrix.platform }}
          build-args: APP_VERSION=${{ needs.release.outputs.new-release-version }}
          outputs: type=image,name=steilerdev/cornerstone,push-by-digest=true,name-canonical=true,push=true

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: docker-digests-${{ matrix.platform == 'linux/amd64' && 'amd64' || 'arm64' }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  # ---------------------------------------------------------------------------
  # Job 3: Docker Merge — combine per-platform digests into multi-arch manifest
  # ---------------------------------------------------------------------------
  docker:
    name: Docker
    runs-on: ubuntu-latest
    needs: [release, docker-build]

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Download digests
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: /tmp/digests
          pattern: docker-digests-*
          merge-multiple: true

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Login to Docker Hub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker metadata (beta)
        id: meta-beta
        if: needs.release.outputs.is-prerelease == 'true'
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6
        with:
          images: steilerdev/cornerstone
          tags: |
            type=raw,value=${{ needs.release.outputs.new-release-version }}
            type=raw,value=beta

      - name: Docker metadata (stable)
        id: meta-stable
        if: needs.release.outputs.is-prerelease == 'false'
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6
        with:
          images: steilerdev/cornerstone
          tags: |
            type=semver,pattern={{version}},value=${{ needs.release.outputs.new-release-version }}
            type=semver,pattern={{major}}.{{minor}},value=${{ needs.release.outputs.new-release-version }}
            type=raw,value=latest

      - name: Create multi-arch manifest and push
        working-directory: /tmp/digests
        run: |
          TAGS="${{ steps.meta-beta.outputs.tags || steps.meta-stable.outputs.tags }}"
          TAG_ARGS=$(echo "$TAGS" | xargs printf -- '--tag %s\n')
          docker buildx imagetools create $TAG_ARGS \
            $(printf 'steilerdev/cornerstone@sha256:%s ' *)

      - name: Inspect manifest
        run: |
          TAGS="${{ steps.meta-beta.outputs.tags || steps.meta-stable.outputs.tags }}"
          FIRST_TAG=$(echo "$TAGS" | head -n1 | xargs)
          docker buildx imagetools inspect "$FIRST_TAG"

      - name: Job summary
        run: |
          VERSION="${{ needs.release.outputs.new-release-version }}"
          TAGS="${{ steps.meta-beta.outputs.tags || steps.meta-stable.outputs.tags }}"

          {
            echo "### Docker Image Published"
            echo ""
            echo "**Version:** \`${VERSION}\`"
            echo ""
            echo "**Tags pushed:**"
          } >> "$GITHUB_STEP_SUMMARY"

          echo "$TAGS" | tr ',' '\n' | while read -r TAG; do
            TAG=$(echo "$TAG" | xargs)
            [ -n "$TAG" ] && echo "- \`${TAG}\`" >> "$GITHUB_STEP_SUMMARY"
          done

          {
            echo ""
            echo "**Docker Hub:** [steilerdev/cornerstone](https://hub.docker.com/r/steilerdev/cornerstone)"
          } >> "$GITHUB_STEP_SUMMARY"

  # ---------------------------------------------------------------------------
  # Job 4: Docker Scout Security Scan
  # ---------------------------------------------------------------------------
  scout:
    name: Docker Scout
    runs-on: ubuntu-latest
    needs: [release, docker]
    if: needs.release.outputs.new-release-published == 'true'

    permissions:
      contents: read
      security-events: write

    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker Scout CVE scan
        uses: docker/scout-action@8910519cee8ac046f3ee99686b0dc6654d5ba1a7 # v1.20.3
        with:
          command: cves
          image: steilerdev/cornerstone:${{ needs.release.outputs.new-release-version }}
          sarif-file: scout-results.sarif
          summary: true

      - name: Upload SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@c10b8064de6f491fea524254123dbe5e09572f13 # v4
        if: always()
        with:
          sarif_file: scout-results.sarif

      - name: Job summary
        if: always()
        run: |
          VERSION="${{ needs.release.outputs.new-release-version }}"
          {
            echo "### Docker Scout CVE Scan"
            echo ""
            echo "Scanned \`steilerdev/cornerstone:${VERSION}\` for vulnerabilities."
            echo ""
            echo "**Results:** [GitHub Security tab](https://github.com/steilerDev/cornerstone/security/code-scanning)"
          } >> "$GITHUB_STEP_SUMMARY"

  # ---------------------------------------------------------------------------
  # Job 5: Merge main back into beta after stable release
  # ---------------------------------------------------------------------------
  merge-back:
    name: Merge Back to Beta
    runs-on: ubuntu-latest
    needs: [release]
    if: >-
      needs.release.outputs.new-release-published == 'true' &&
      needs.release.outputs.is-prerelease == 'false'

    steps:
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3
        with:
          app-id: ${{ vars.BOT_APP_ID }}
          private-key: ${{ secrets.BOT_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: beta
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Merge main into beta
        run: |
          VERSION="${{ needs.release.outputs.new-release-version }}"

          # Skip if beta already has the release tag
          if git merge-base --is-ancestor "v${VERSION}" origin/beta 2>/dev/null; then
            echo "v${VERSION} is already an ancestor of beta — skipping"
            exit 0
          fi

          git config user.name "cornerstone-bot[bot]"
          git config user.email "${{ steps.app-token.outputs.app-slug }}[bot]@users.noreply.github.com"
          git merge origin/main --no-edit -m "chore: merge main (v${VERSION}) back into beta"
          git push origin beta

  # ---------------------------------------------------------------------------
  # Job 6: Push README.md to DockerHub
  # ---------------------------------------------------------------------------
  dockerhub-readme:
    name: DockerHub README
    runs-on: ubuntu-latest
    needs: [release, docker]
    if: >-
      needs.release.outputs.new-release-published == 'true' &&
      needs.release.outputs.is-prerelease == 'false'

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Push README to DockerHub
        uses: peter-evans/dockerhub-description@1b9a80c056b620d92cedb9d9b5a223409c68ddfa # v5
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: steilerdev/cornerstone
          readme-filepath: ./README.md

  # ---------------------------------------------------------------------------
  # Job 7: Capture documentation screenshots from the released Docker image
  # ---------------------------------------------------------------------------
  docs-screenshots:
    name: Docs Screenshots
    runs-on: ubuntu-latest
    needs: [release, docker]
    if: >-
      needs.release.outputs.new-release-published == 'true' &&
      needs.release.outputs.is-prerelease == 'false'

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: v${{ needs.release.outputs.new-release-version }}

      - name: Login to Docker Hub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Pull and retag released image
        run: |
          docker pull steilerdev/cornerstone:${{ needs.release.outputs.new-release-version }}
          docker tag steilerdev/cornerstone:${{ needs.release.outputs.new-release-version }} cornerstone:e2e

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install E2E workspace dependencies
        run: npm ci --workspace=e2e

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps
        working-directory: e2e

      - name: Capture screenshots
        run: npm run docs:screenshots

      - name: Upload screenshots artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: docs-screenshots
          path: docs/static/img/screenshots/
          retention-days: 1

  # ---------------------------------------------------------------------------
  # Job 8: Build and deploy documentation site to GitHub Pages
  # ---------------------------------------------------------------------------
  docs-deploy:
    name: Docs Deploy
    runs-on: ubuntu-latest
    needs: [release, docs-screenshots]
    if: >-
      needs.release.outputs.new-release-published == 'true' &&
      needs.release.outputs.is-prerelease == 'false'

    permissions:
      contents: read
      pages: write
      id-token: write

    concurrency:
      group: pages
      cancel-in-progress: false

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: v${{ needs.release.outputs.new-release-version }}

      - name: Download screenshots
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: docs-screenshots
          path: docs/static/img/screenshots/

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install docs dependencies
        run: npm ci --workspace=docs

      - name: Build docs
        run: npm run build --workspace=docs

      - name: Setup Pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4
        with:
          path: docs/build

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
